apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: resume
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/duaneoca/interactive-resume-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: resume-secrets
                  key: anthropic-api-key
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: resume-secrets
                  key: admin-token
            - name: DB_PATH
              value: "/data/analytics.db"
            - name: ALLOWED_ORIGINS
              value: "https://hire-duane.org"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: analytics-data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: analytics-data
          persistentVolumeClaim:
            claimName: analytics-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: resume
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
