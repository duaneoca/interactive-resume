# DO NOT commit real secrets. This is a template only.
# Create the actual secret with:
#
#   kubectl create secret generic resume-secrets \
#     --namespace resume \
#     --from-literal=anthropic-api-key=YOUR_KEY_HERE \
#     --from-literal=admin-token=YOUR_TOKEN_HERE
#
# To add admin-token to an existing secret:
#
#   kubectl patch secret resume-secrets -n resume \
#     -p '{"stringData":{"admin-token":"YOUR_TOKEN_HERE"}}'
#
apiVersion: v1
kind: Secret
metadata:
  name: resume-secrets
  namespace: resume
type: Opaque
stringData:
  anthropic-api-key: REPLACE_ME
  admin-token: REPLACE_ME
