name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual runs

env:
  FRONTEND_IMAGE: ghcr.io/duaneoca/interactive-resume-frontend
  BACKEND_IMAGE: ghcr.io/duaneoca/interactive-resume-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed for GHCR push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build & push frontend ──────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & push backend ───────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to k3s ──────────────────────────────────────
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/cert-issuer.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Roll out new images
        run: |
          kubectl rollout restart deployment/frontend -n resume
          kubectl rollout restart deployment/backend -n resume
          kubectl rollout status deployment/frontend -n resume --timeout=120s
          kubectl rollout status deployment/backend -n resume --timeout=180s

      - name: Verify deployment
        run: |
          kubectl get pods -n resume
          kubectl get ingress -n resume
